<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>35. Search Insert Position: EASY</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>
  <body>
    <ol>
      <li>
        <h3>
          I solved it on my own without help of AI. However, when i had the code
          reviewed by AI, I found out that there was a MUCH simpler solution.
          which is to use indexOf(). It was ONE LINE. This goes to show how
          important it is for me to familiarize myself with built-in string
          methods in JavaScript.
        </h3>
      </li>
    </ol>
    <script>
      var searchInsert = function (nums, target) {
        let left = 0;
        let right = nums.length - 1;

        while (left <= right) {
          const mid = Math.floor((left + right) / 2);

          // RETURN IF NUMS INCLUDES TARGET
          if (nums[mid] === target) {
            return mid;
          }

          if(target === nums[left] + 1){
            return left + 1
          }

          if (nums[mid] < target) {
            left = mid + 1;
          } else {
            right = mid - 1;
          }
        }

        return -1;
      };

      // TEST CASES
      console.log(searchInsert([1, 3, 5, 6], 5));
      console.log(searchInsert([1, 3, 5, 6], 2));
      console.log(searchInsert([1, 3, 5, 6], 7));
      console.log(searchInsert([1, 3, 5, 6], 0));
      
    </script>
  </body>
</html>
